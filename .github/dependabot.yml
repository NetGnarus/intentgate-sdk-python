# Dependabot configuration — written by scripts/security-rollout.sh.
# Re-running the script will overwrite this file; commit your own edits
# to a separate config (or just stop running the script for this repo).
version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - automated
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - ci
      - automated
