name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Must already exist on the repo.'
        required: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Validate distributions with twine
        run: twine check --strict dist/*

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # PyPI trusted publishing requires:
    #   - id-token: write   (OIDC token exchange)
    #   - the workflow + environment to be configured as a Trusted Publisher
    #     on the PyPI project page (one-time manual step on pypi.org).
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/intentgate/
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No token: PyPI verifies the workflow's OIDC identity against the
          # configured Trusted Publisher.
          packages-dir: dist/
          # Don't fail if a release with this version already exists; lets
          # us re-run after a network blip without recreating the tag.
          skip-existing: true
          print-hash: true

  attest:
    name: Attest build provenance
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Attest provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*'
